# 注册策略
registration_strategy:
  phase1:
    name: "立即注册"
    tools: ["GitHub Copilot", "ChatGPT Plus", "Midjourney"]
    timeframe: "今天"
    goal: "快速测试变现效果"
    
  phase2:
    name: "本周完成"
    tools: ["Jasper.ai", "Copy.ai", "Surfer SEO"]
    timeframe: "3月4-7日"
    goal: "建立高佣金组合"
    
  phase3:
    name: "下周扩展"
    tools: ["Canva Pro", "Notion AI", "Grammarly Premium"]
    timeframe: "3月11-14日"
    goal: "覆盖更多用户群体"
    
  phase4:
    name: "长期目标"
    tools: ["SEMrush", "Ahrefs"]
    timeframe: "3月内"
    goal: "获取极高佣金工具"

# 佣金目标
commission_goals:
  month1: "$500-1000"
  month3: "$2000-5000"
  month6: "$5000-10000+"
  primary_source: "月费佣金（20-50%）"
  secondary_source: "一次性佣金、广告收入"

# 跟踪要求
tracking:
  required: "UTM参数、专用链接"
  analytics: "Google Analytics + 自定义跟踪"
  reporting: "每日收入报告"
